<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aria — AI English Tutor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface-hover: #222240;
      --accent: #7c5cfc;
      --accent-glow: #7c5cfc66;
      --green: #34d399;
      --orange: #fb923c;
      --red: #f87171;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --radius: 16px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    .ambient {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(150px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }
    .ambient-1 { background: #7c5cfc; top: -200px; left: -100px; }
    .ambient-2 { background: #06b6d4; bottom: -200px; right: -100px; }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }
    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    header p {
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid #ffffff0a;
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 16px;
    }

    /* --- Status --- */
    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #475569;
      flex-shrink: 0;
      transition: all 0.3s;
    }
    .status-dot.live {
      background: var(--green);
      box-shadow: 0 0 10px var(--green);
      animation: pulse 1.6s ease-in-out infinite;
    }
    .status-dot.speaking {
      background: var(--orange);
      box-shadow: 0 0 10px var(--orange);
      animation: pulse 0.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .status-text {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    /* --- Visualizer --- */
    .visualizer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 80px;
      background: #ffffff06;
      border-radius: 12px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .vis-bar {
      width: 4px;
      border-radius: 4px;
      background: var(--accent);
      height: 6px;
      transition: height 0.08s ease;
      opacity: 0.7;
    }
    .vis-bar.active { opacity: 1; }

    /* --- Button --- */
    .btn-row {
      display: flex;
      gap: 12px;
    }
    .btn {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: #6a4ae0; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled {
      background: #374151;
      color: #6b7280;
      cursor: not-allowed;
      transform: none;
    }
    .btn-danger {
      background: #991b1b;
      color: #fca5a5;
      display: none;
    }
    .btn-danger:hover { background: #7f1d1d; transform: translateY(-1px); }
    .btn-danger:active { transform: translateY(0); }

    /* --- Log --- */
    .log-card {
      background: var(--surface);
      border: 1px solid #ffffff0a;
      border-radius: var(--radius);
      padding: 20px;
    }
    .log-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .log-scroll {
      max-height: 180px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #334155 transparent;
    }
    .log-scroll::-webkit-scrollbar { width: 4px; }
    .log-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    .log-entry {
      font-size: 0.8rem;
      line-height: 1.7;
      padding: 2px 0;
      color: var(--text-muted);
    }
    .log-entry.ok   { color: var(--green); }
    .log-entry.err  { color: var(--red); }
    .log-entry.warn { color: var(--orange); }

    .tip {
      text-align: center;
      font-size: 0.75rem;
      color: #475569;
      margin-top: 20px;
    }

    /* --- Mode Selection --- */
    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .mode-card {
      background: var(--surface);
      border: 2px solid transparent;
      border-radius: var(--radius);
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .mode-card:hover {
      border-color: var(--accent);
      background: var(--surface-hover);
      transform: translateY(-2px);
    }
    .mode-icon {
      font-size: 2rem;
      margin-bottom: 10px;
    }
    .mode-label {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 4px;
    }
    .mode-desc {
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* --- Word Display --- */
    .word-view { display: none; }
    .word-display {
      text-align: center;
      padding: 32px 20px;
    }
    .word-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .word-value {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent), #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .word-category {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 24px;
    }
    .word-actions {
      display: flex;
      gap: 10px;
    }
    .btn-ghost {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ffffff1a;
      border-radius: 12px;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--text);
      background: #ffffff08;
    }
    .btn-back {
      flex: 0 0 auto;
      padding: 12px 16px;
      border: 1px solid #ffffff1a;
      border-radius: 12px;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-back:hover {
      border-color: var(--red);
      color: var(--red);
    }

    .word-badge {
      display: none;
      align-items: center;
      gap: 8px;
      background: #7c5cfc1a;
      border: 1px solid #7c5cfc33;
      border-radius: 10px;
      padding: 8px 14px;
      margin-bottom: 16px;
      font-size: 0.8rem;
      color: var(--accent);
    }
    .word-badge .badge-word {
      font-weight: 700;
      font-size: 0.95rem;
    }

    .hidden { display: none !important; }

    @media (max-width: 520px) {
      body { padding: 16px; }
      .card, .log-card { padding: 20px; }
      header h1 { font-size: 1.4rem; }
      .word-value { font-size: 1.8rem; }
      .mode-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="ambient ambient-1"></div>
<div class="ambient ambient-2"></div>

<div class="container">
  <header>
    <h1>Aria — AI English Tutor</h1>
    <p>Powered by Gemini 2.5 Native Audio</p>
  </header>

  <!-- Mode Selection View -->
  <div id="modeView">
    <div class="mode-grid">
      <div class="mode-card" id="modeFreeTalk">
        <div class="mode-icon">💬</div>
        <div class="mode-label">Free Talk</div>
        <div class="mode-desc">Practice natural conversation on any topic</div>
      </div>
      <div class="mode-card" id="modeWordPitch">
        <div class="mode-icon">🎯</div>
        <div class="mode-label">Word Pitch</div>
        <div class="mode-desc">Describe a random word &amp; build vocabulary</div>
      </div>
    </div>
  </div>

  <!-- Word Pitch Preview -->
  <div id="wordView" class="word-view">
    <div class="card word-display">
      <div class="word-label">Your word</div>
      <div class="word-value" id="wordValue"></div>
      <div class="word-category" id="wordCategory"></div>
      <div class="word-actions">
        <button class="btn-back" id="backBtn">← Back</button>
        <button class="btn-ghost" id="newWordBtn">New Word</button>
        <button class="btn btn-primary" id="startWordBtn" style="flex:1">Start Session</button>
      </div>
    </div>
  </div>

  <!-- Session View -->
  <div id="sessionView" class="hidden">
    <div class="card">
      <div class="word-badge" id="wordBadge">
        <span>Word:</span>
        <span class="badge-word" id="badgeWord"></span>
      </div>
      <div class="status">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">Ready to connect</span>
      </div>

      <div class="visualizer" id="visualizer"></div>

      <div class="btn-row">
        <button class="btn btn-danger" id="stopBtn" style="display:flex">Stop</button>
      </div>
    </div>

    <div class="log-card">
      <div class="log-title">Session Log</div>
      <div class="log-scroll" id="log">
        <div class="log-entry">Connecting to Aria...</div>
      </div>
    </div>
  </div>

  <p class="tip">Use headphones to prevent echo feedback</p>
</div>

<script>
const MIC_SAMPLE_RATE = 16000;
const PLAYBACK_SAMPLE_RATE = 24000;
const NUM_BARS = 40;

let ws, mediaStream, audioCtx, micSource, processor, analyser, animId;
let playCtx, playQueue = [], playing = false;
let currentMode = "free_talk";
let currentWord = null;

const WORD_BANK = [
  { word: "umbrella",       cat: "Object" },
  { word: "mirror",         cat: "Object" },
  { word: "candle",         cat: "Object" },
  { word: "backpack",       cat: "Object" },
  { word: "scissors",       cat: "Object" },
  { word: "calendar",       cat: "Object" },
  { word: "telescope",      cat: "Object" },
  { word: "compass",        cat: "Object" },
  { word: "chocolate",      cat: "Food" },
  { word: "avocado",        cat: "Food" },
  { word: "cinnamon",       cat: "Food" },
  { word: "pancake",        cat: "Food" },
  { word: "sushi",          cat: "Food" },
  { word: "lemonade",       cat: "Food" },
  { word: "volcano",        cat: "Nature" },
  { word: "rainbow",        cat: "Nature" },
  { word: "waterfall",      cat: "Nature" },
  { word: "thunderstorm",   cat: "Nature" },
  { word: "glacier",        cat: "Nature" },
  { word: "desert",         cat: "Nature" },
  { word: "horizon",        cat: "Nature" },
  { word: "nostalgia",      cat: "Feeling" },
  { word: "courage",        cat: "Feeling" },
  { word: "jealousy",       cat: "Feeling" },
  { word: "excitement",     cat: "Feeling" },
  { word: "loneliness",     cat: "Feeling" },
  { word: "gratitude",      cat: "Feeling" },
  { word: "curiosity",      cat: "Feeling" },
  { word: "freedom",        cat: "Concept" },
  { word: "tradition",      cat: "Concept" },
  { word: "innovation",     cat: "Concept" },
  { word: "democracy",      cat: "Concept" },
  { word: "privacy",        cat: "Concept" },
  { word: "ambition",       cat: "Concept" },
  { word: "justice",        cat: "Concept" },
  { word: "negotiate",      cat: "Action" },
  { word: "celebrate",      cat: "Action" },
  { word: "apologize",      cat: "Action" },
  { word: "explore",        cat: "Action" },
  { word: "improvise",      cat: "Action" },
  { word: "procrastinate",  cat: "Action" },
  { word: "volunteer",      cat: "Action" },
  { word: "airport",        cat: "Place" },
  { word: "library",        cat: "Place" },
  { word: "hospital",       cat: "Place" },
  { word: "museum",         cat: "Place" },
  { word: "restaurant",     cat: "Place" },
  { word: "lighthouse",     cat: "Place" },
  { word: "stadium",        cat: "Place" },
  { word: "architect",      cat: "Profession" },
  { word: "journalist",     cat: "Profession" },
  { word: "astronaut",      cat: "Profession" },
  { word: "detective",      cat: "Profession" },
  { word: "surgeon",        cat: "Profession" },
  { word: "diplomat",       cat: "Profession" },
  { word: "firefighter",    cat: "Profession" },
  { word: "algorithm",      cat: "Technology" },
  { word: "satellite",      cat: "Technology" },
  { word: "robot",          cat: "Technology" },
  { word: "hologram",       cat: "Technology" },
  { word: "encryption",     cat: "Technology" },
  { word: "adventure",      cat: "Misc" },
  { word: "recycling",      cat: "Misc" },
  { word: "marathon",       cat: "Misc" },
  { word: "photography",    cat: "Misc" },
  { word: "meditation",     cat: "Misc" },
  { word: "vacation",       cat: "Misc" },
  { word: "competition",    cat: "Misc" },
  { word: "nightmare",      cat: "Misc" },
  { word: "deadline",       cat: "Misc" },
  { word: "souvenir",       cat: "Misc" },
];

function pickRandomWord() {
  return WORD_BANK[Math.floor(Math.random() * WORD_BANK.length)];
}

// --- Views ---
const modeView    = document.getElementById("modeView");
const wordView    = document.getElementById("wordView");
const sessionView = document.getElementById("sessionView");

function showView(view) {
  modeView.classList.toggle("hidden", view !== "mode");
  wordView.style.display = view === "word" ? "block" : "none";
  sessionView.classList.toggle("hidden", view !== "session");
}

// --- Mode selection ---
document.getElementById("modeFreeTalk").addEventListener("click", () => {
  currentMode = "free_talk";
  currentWord = null;
  startSession();
});

document.getElementById("modeWordPitch").addEventListener("click", () => {
  currentMode = "word_pitch";
  showNewWord();
  showView("word");
});

function showNewWord() {
  const entry = pickRandomWord();
  currentWord = entry;
  document.getElementById("wordValue").textContent = entry.word;
  document.getElementById("wordCategory").textContent = entry.cat;
}

document.getElementById("newWordBtn").addEventListener("click", showNewWord);

document.getElementById("backBtn").addEventListener("click", () => {
  currentMode = "free_talk";
  currentWord = null;
  showView("mode");
});

document.getElementById("startWordBtn").addEventListener("click", () => {
  startSession();
});

// --- Visualizer setup ---
let bars = [];
function initVisualizer() {
  const visEl = document.getElementById("visualizer");
  visEl.innerHTML = "";
  bars = Array.from({ length: NUM_BARS }, () => {
    const b = document.createElement("div");
    b.className = "vis-bar";
    visEl.appendChild(b);
    return b;
  });
}

function animateVis() {
  if (!analyser) {
    bars.forEach(b => { b.style.height = "6px"; b.classList.remove("active"); });
    return;
  }
  const freq = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(freq);
  const step = freq.length / NUM_BARS;
  bars.forEach((b, i) => {
    const val = freq[Math.floor(i * step)] / 255;
    const h = 6 + val * 60;
    b.style.height = h + "px";
    b.classList.toggle("active", val > 0.15);
  });
  animId = requestAnimationFrame(animateVis);
}

// --- Log ---
function log(msg, cls = "") {
  const logEl = document.getElementById("log");
  const d = document.createElement("div");
  d.className = "log-entry" + (cls ? ` ${cls}` : "");
  d.textContent = msg;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}

function setStatus(text, state) {
  document.getElementById("statusText").textContent = text;
  const dot = document.getElementById("statusDot");
  dot.className = "status-dot" + (state ? ` ${state}` : "");
}

// --- PCM conversion ---
function float32ToInt16(f32) {
  const out = new Int16Array(f32.length);
  for (let i = 0; i < f32.length; i++) {
    out[i] = Math.max(-32768, Math.min(32767, f32[i] * 32768));
  }
  return out;
}

// --- Audio playback queue ---
function enqueueAudio(int16Buf) {
  const f32 = new Float32Array(int16Buf.length);
  for (let i = 0; i < int16Buf.length; i++) f32[i] = int16Buf[i] / 32768;
  playQueue.push(f32);
  if (!playing) drainQueue();
}

function drainQueue() {
  if (!playQueue.length) { playing = false; return; }
  playing = true;
  if (!playCtx || playCtx.state === "closed") {
    playCtx = new AudioContext({ sampleRate: PLAYBACK_SAMPLE_RATE });
  }
  const samples = playQueue.shift();
  const buf = playCtx.createBuffer(1, samples.length, PLAYBACK_SAMPLE_RATE);
  buf.copyToChannel(samples, 0);
  const src = playCtx.createBufferSource();
  src.buffer = buf;
  src.connect(playCtx.destination);
  src.onended = drainQueue;
  src.start();
}

// --- Start session ---
async function startSession() {
  showView("session");
  initVisualizer();

  if (currentMode === "word_pitch" && currentWord) {
    const badge = document.getElementById("wordBadge");
    badge.style.display = "flex";
    document.getElementById("badgeWord").textContent = currentWord.word;
    log(`Word Pitch mode — your word is: ${currentWord.word}`, "warn");
  } else {
    document.getElementById("wordBadge").style.display = "none";
    log("Free Talk mode — say anything!", "ok");
  }

  setStatus("Requesting microphone...", "");
  log("Requesting microphone access...");

  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: MIC_SAMPLE_RATE, channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });
  } catch (e) {
    log("Microphone denied: " + e.message, "err");
    setStatus("Microphone denied", "");
    returnToMenu();
    return;
  }

  audioCtx = new AudioContext({ sampleRate: MIC_SAMPLE_RATE });
  micSource = audioCtx.createMediaStreamSource(mediaStream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 128;
  micSource.connect(analyser);
  animateVis();

  let wsUrl = `ws://${location.host}?mode=${currentMode}`;
  if (currentMode === "word_pitch" && currentWord) {
    wsUrl += `&word=${encodeURIComponent(currentWord.word)}`;
  }
  ws = new WebSocket(wsUrl);
  ws.binaryType = "arraybuffer";

  ws.onopen = () => {
    setStatus("Connected — speak now!", "live");
    log("Connected to Aria. Go ahead and speak!", "ok");

    processor = audioCtx.createScriptProcessor(4096, 1, 1);
    processor.onaudioprocess = (e) => {
      if (ws.readyState === WebSocket.OPEN) {
        const pcm = float32ToInt16(e.inputBuffer.getChannelData(0));
        ws.send(pcm.buffer);
      }
    };
    micSource.connect(processor);
    processor.connect(audioCtx.destination);
  };

  ws.onmessage = (e) => {
    setStatus("Aria is speaking...", "speaking");
    enqueueAudio(new Int16Array(e.data));
    clearTimeout(ws._statusTimer);
    ws._statusTimer = setTimeout(() => {
      if (ws?.readyState === WebSocket.OPEN) setStatus("Connected — speak now!", "live");
    }, 1500);
  };

  ws.onerror = () => log("Connection error", "err");

  ws.onclose = () => {
    setStatus("Disconnected", "");
    log("Session ended.");
    cleanup();
  };
}

// --- Stop session ---
document.getElementById("stopBtn").addEventListener("click", () => {
  ws?.close();
  cleanup();
  returnToMenu();
  log("Session stopped.");
});

function returnToMenu() {
  showView("mode");
  setStatus("Ready to connect", "");
}

function cleanup() {
  cancelAnimationFrame(animId);
  analyser = null;
  bars.forEach(b => { b.style.height = "6px"; b.classList.remove("active"); });
  processor?.disconnect();
  micSource?.disconnect();
  mediaStream?.getTracks().forEach(t => t.stop());
  audioCtx?.close();
  playCtx?.close();
  audioCtx = micSource = processor = mediaStream = ws = playCtx = null;
  playQueue = [];
  playing = false;
}
</script>
</body>
</html>
